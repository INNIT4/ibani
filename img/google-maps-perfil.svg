<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" style="background:#1A1714;">
    <defs>
        <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#150d29"/>
        <stop offset="100%" stop-color="#1e1040"/>
        </linearGradient>
        <linearGradient id="map-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e8e3d8"/>
        <stop offset="100%" stop-color="#d4cfc4"/>
        </linearGradient>
        <filter id="shadow">
        <feDropShadow dx="0" dy="8" stdDeviation="18" flood-opacity=".45"/>
        </filter>
        <filter id="glow">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg-grad)"/>
    <!-- Subtle grid -->
    <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <!-- Background text -->
    <text x="600" y="340" text-anchor="middle" font-family="Georgia,serif" font-size="140" fill="rgba(255,255,255,.03)" font-weight="300" letter-spacing="-4">GOOGLE MAPS</text>
    <!-- Phone frame -->
    <g transform="translate(0, 52)">
    <rect x="140" y="45" width="260" height="440" rx="28" fill="#111" filter="url(#shadow)"/>
    <rect x="150" y="60" width="240" height="410" rx="20" fill="#fff"/>
    <!-- Phone screen: map -->
    <rect x="150" y="60" width="240" height="54" rx="20" fill="#fff"/>
    <rect x="166" y="76" width="150" height="22" rx="11" fill="#f1f3f4"/>
    <circle cx="178" cy="87" r="6" fill="#9aa0a6"/>
    <rect x="190" y="82" width="80" height="10" rx="3" fill="#c4c7cc"/>
    <!-- Map area -->
    <rect x="150" y="114" width="240" height="230" fill="url(#map-grad)"/>
    <!-- Roads -->
    <line x1="150" y1="180" x2="390" y2="180" stroke="#fff" stroke-width="3"/>
    <line x1="150" y1="240" x2="390" y2="240" stroke="#fff" stroke-width="2.5"/>
    <line x1="150" y1="300" x2="390" y2="300" stroke="#fff" stroke-width="2"/>
    <line x1="220" y1="114" x2="220" y2="344" stroke="#fff" stroke-width="2.5"/>
    <line x1="310" y1="114" x2="310" y2="344" stroke="#fff" stroke-width="3"/>
    <!-- Map pins -->
    <g transform="translate(265,195)">
        <ellipse cx="0" cy="20" rx="8" ry="3" fill="rgba(0,0,0,.15)"/>
        <path d="M0,-20 C-11,-20 -16,-11 -16,-4 C-16,8 0,20 0,20 C0,20 16,8 16,-4 C16,-11 11,-20 0,-20Z" fill="#C85A28"/>
        <circle cx="0" cy="-5" r="5" fill="#fff"/>
    </g>
    <g transform="translate(195,250)">
        <ellipse cx="0" cy="16" rx="6" ry="2.5" fill="rgba(0,0,0,.1)"/>
        <path d="M0,-14 C-8,-14 -12,-8 -12,-3 C-12,6 0,16 0,16 C0,16 12,6 12,-3 C12,-8 8,-14 0,-14Z" fill="#4285f4"/>
        <circle cx="0" cy="-4" r="4" fill="#fff"/>
    </g>
    <g transform="translate(340,165)">
        <ellipse cx="0" cy="16" rx="6" ry="2.5" fill="rgba(0,0,0,.1)"/>
        <path d="M0,-14 C-8,-14 -12,-8 -12,-3 C-12,6 0,16 0,16 C0,16 12,6 12,-3 C12,-8 8,-14 0,-14Z" fill="#34a853"/>
        <circle cx="0" cy="-4" r="4" fill="#fff"/>
    </g>
    <!-- Business card on phone -->
    <rect x="150" y="344" width="240" height="126" fill="#fff"/>
    <rect x="164" y="356" width="100" height="12" rx="3" fill="#1A1714" opacity=".8"/>
    <rect x="164" y="376" width="60" height="8" rx="2" fill="#C85A28" opacity=".6"/>
    <rect x="230" y="376" width="40" height="8" rx="2" fill="#fbbc04"/>
    <rect x="164" y="394" width="160" height="6" rx="2" fill="#999" opacity=".3"/>
    <rect x="164" y="408" width="120" height="6" rx="2" fill="#999" opacity=".3"/>
    <rect x="164" y="428" width="80" height="24" rx="12" fill="#4285f4"/>
    <rect x="254" y="428" width="80" height="24" rx="12" fill="#fff" stroke="#dadce0" stroke-width="1"/>
    </g>

    <!-- Desktop browser frame -->
    <g transform="translate(0, 52)">
    <rect x="460" y="70" width="640" height="390" rx="12" fill="#1A1714" filter="url(#shadow)"/>
    <rect x="460" y="70" width="640" height="36" rx="12" fill="#2a2520"/>
    <!-- Browser dots -->
    <circle cx="482" cy="88" r="5" fill="#ff5f57"/>
    <circle cx="500" cy="88" r="5" fill="#ffbd2e"/>
    <circle cx="518" cy="88" r="5" fill="#28c940"/>
    <!-- URL bar -->
    <rect x="545" y="80" width="240" height="16" rx="4" fill="rgba(255,255,255,.08)"/>
    <text x="570" y="92" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.35)">business.google.com</text>
    <!-- GBP Dashboard -->
    <rect x="460" y="106" width="640" height="354" fill="#fff"/>
    <!-- Sidebar -->
    <rect x="460" y="106" width="160" height="354" fill="#f8f9fa"/>
    <rect x="478" y="124" width="80" height="14" rx="3" fill="#4285f4" opacity=".8"/>
    <rect x="478" y="152" width="100" height="8" rx="2" fill="#999" opacity=".3"/>
    <rect x="478" y="170" width="90" height="8" rx="2" fill="#999" opacity=".3"/>
    <rect x="478" y="188" width="110" height="8" rx="2" fill="#C85A28" opacity=".5"/>
    <rect x="478" y="206" width="80" height="8" rx="2" fill="#999" opacity=".3"/>
    <rect x="478" y="224" width="95" height="8" rx="2" fill="#999" opacity=".3"/>
    <rect x="478" y="242" width="70" height="8" rx="2" fill="#999" opacity=".3"/>
    <!-- Main content area -->
    <rect x="640" y="120" width="200" height="18" rx="4" fill="#1A1714" opacity=".7"/>
    <rect x="640" y="150" width="300" height="8" rx="2" fill="#999" opacity=".25"/>
    <rect x="640" y="166" width="250" height="8" rx="2" fill="#999" opacity=".25"/>
    <!-- Stats cards -->
    <rect x="640" y="194" width="140" height="80" rx="8" fill="#f8f9fa" stroke="#e8e8e8"/>
    <text x="660" y="218" font-family="sans-serif" font-size="9" fill="#999">Búsquedas</text>
    <text x="660" y="248" font-family="Georgia,serif" font-size="24" fill="#C85A28" font-weight="700">1,247</text>
    <rect x="800" y="194" width="140" height="80" rx="8" fill="#f8f9fa" stroke="#e8e8e8"/>
    <text x="820" y="218" font-family="sans-serif" font-size="9" fill="#999">Clics al sitio</text>
    <text x="820" y="248" font-family="Georgia,serif" font-size="24" fill="#4285f4" font-weight="700">312</text>
    <rect x="960" y="194" width="120" height="80" rx="8" fill="#f8f9fa" stroke="#e8e8e8"/>
    <text x="978" y="218" font-family="sans-serif" font-size="9" fill="#999">Llamadas</text>
    <text x="978" y="248" font-family="Georgia,serif" font-size="24" fill="#34a853" font-weight="700">89</text>
    <!-- Reviews snippet -->
    <rect x="640" y="294" width="440" height="100" rx="8" fill="#f8f9fa" stroke="#e8e8e8"/>
    <rect x="660" y="312" width="100" height="10" rx="3" fill="#1A1714" opacity=".5"/>
    <text x="660" y="342" font-family="sans-serif" font-size="14" fill="#fbbc04">★ ★ ★ ★ ★</text>
    <rect x="740" y="332" width="40" height="10" rx="3" fill="#999" opacity=".3"/>
    <rect x="660" y="358" width="320" height="6" rx="2" fill="#999" opacity=".2"/>
    <rect x="660" y="372" width="280" height="6" rx="2" fill="#999" opacity=".2"/>
    <!-- Glow accents -->
    <circle cx="265" cy="200" r="80" fill="#C85A28" opacity=".08" filter="url(#glow)"/>
    <circle cx="780" cy="240" r="120" fill="#7c3aed" opacity=".06" filter="url(#glow)"/>
    </g>
</svg>
